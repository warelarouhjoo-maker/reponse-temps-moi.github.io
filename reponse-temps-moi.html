<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revelaté — Réponses</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@300;400;500&display=swap');

    :root {
      --bg: #0d0a10;
      --surface: #160f1e;
      --border: rgba(255,200,220,0.15);
      --accent: #e891b0;
      --accent2: #a86fa3;
      --text: #f0e6ef;
      --muted: rgba(240,230,239,0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-style: italic;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      margin-top: 8px;
    }

    /* Grille de cartes */
    #responses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .response-card {
      background: rgba(22,15,30,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .response-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-time {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .card-type {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(232,145,176,0.3);
      border-radius: 50px;
      padding: 3px 12px;
      margin-bottom: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .field-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-style: italic;
      color: var(--text);
      word-break: break-word;
    }

    /* Badge réponse finale */
    .badge-oui {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0a10;
      font-weight: 500;
      font-size: 0.85rem;
      padding: 6px 20px;
      border-radius: 50px;
      letter-spacing: 0.06em;
    }

    /* État vide */
    #empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    #empty .icon { font-size: 3rem; margin-bottom: 20px; }

    #empty p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
    }

    /* Barre actions */
    .toolbar {
      max-width: 900px;
      margin: 0 auto 28px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn-tool {
      font-family: 'Raleway', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 22px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
    }

    #btn-clear {
      background: transparent;
      border: 1px solid rgba(232,145,176,0.3);
      color: var(--muted);
    }

    #btn-clear:hover {
      border-color: #e05;
      color: #e05;
    }

    #btn-export {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    #btn-export:hover {
      background: var(--accent);
      color: #0d0a10;
    }

    /* Counter badge */
    #counter {
      max-width: 900px;
      margin: 0 auto 16px;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    #counter span {
      color: var(--accent);
      font-weight: 500;
    }

    /* Separateur */
    .sep {
      max-width: 900px;
      margin: 0 auto 36px;
      border: none;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <h1>Revelaté — Réponses</h1>
    <p>toutes les saisies reçues depuis le site</p>
  </header>

  <div id="counter">Chargement…</div>
  <hr class="sep">

  <div class="toolbar">
    <button class="btn-tool" id="btn-export">⬇ Exporter JSON</button>
    <button class="btn-tool" id="btn-clear">✕ Effacer tout</button>
  </div>

  <div id="responses-grid"></div>
  <div id="empty" style="display:none">
    <div class="icon">💌</div>
    <p>Aucune réponse reçue pour l'instant…</p>
  </div>

  <script>
    /* ============================================================
       reponse-temps-moi — Lecteur de réponses
       Stockage local (localStorage) côté GitHub Pages.
       Les données arrivent via URL hash ou query param envoyé
       par vision.js, OU sont injectées depuis une source externe.
       ============================================================ */

    const STORAGE_KEY = "revelate_responses";

    // ── Récupère les réponses stockées ──────────────────────────
    function getResponses() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch { return []; }
    }

    function saveResponses(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    // ── Ingestion via query string (POST simulé en GET) ─────────
    // vision.js envoie en mode no-cors → pas de réponse lisible.
    // Solution : le endpoint redirige vers cette page avec les
    // données en paramètres GET, ex :
    // ?type=surnom&surnom=Petite+étoile
    // Cette page les capture et les stocke en localStorage.
    function ingestFromURL() {
      const params = new URLSearchParams(window.location.search);
      if (!params.has("type")) return false;

      const entry = { timestamp: new Date().toISOString() };
      params.forEach((v, k) => { entry[k] = v; });

      const all = getResponses();
      all.unshift(entry);       // plus récent en premier
      saveResponses(all);

      // Nettoie l'URL sans recharger
      window.history.replaceState({}, "", window.location.pathname);
      return true;
    }

    // ── Rendu carte ─────────────────────────────────────────────
    function typeLabel(t) {
      const map = {
        surnom:          "Surnom secret",
        sante_filiere:   "Bien-être & Filière",
        reponse_finale:  "Réponse finale 💗",
      };
      return map[t] || t;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString("fr-FR", {
        day: "2-digit", month: "long", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    }

    function renderCard(entry, index) {
      const card = document.createElement("div");
      card.className = "response-card";
      card.style.animationDelay = (index * 0.07) + "s";

      let inner = `
        <div class="card-time">${formatDate(entry.timestamp)}</div>
        <div class="card-type">${typeLabel(entry.type)}</div>
      `;

      if (entry.type === "surnom") {
        inner += field("Surnom donné", entry.surnom || "—");
      } else if (entry.type === "sante_filiere") {
        inner += field("Comment ça va", entry.sante || "—");
        inner += field("Filière choisie", entry.fil   || "—");
      } else if (entry.type === "reponse_finale") {
        inner += `<div class="field"><span class="badge-oui">✓ Elle a dit OUI 💗</span></div>`;
      } else {
        // type inconnu : affiche tout
        Object.keys(entry).filter(k => k !== "type" && k !== "timestamp").forEach(k => {
          inner += field(k, entry[k]);
        });
      }

      card.innerHTML = inner;
      return card;
    }

    function field(label, value) {
      return `
        <div class="field">
          <div class="field-label">${label}</div>
          <div class="field-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Rendu principal ─────────────────────────────────────────
    function render() {
      const all  = getResponses();
      const grid = document.getElementById("responses-grid");
      const empty = document.getElementById("empty");
      const counter = document.getElementById("counter");

      grid.innerHTML = "";

      if (all.length === 0) {
        grid.style.display = "none";
        empty.style.display = "block";
        counter.innerHTML = "Aucune réponse enregistrée.";
        return;
      }

      grid.style.display = "grid";
      empty.style.display = "none";
      counter.innerHTML = `<span>${all.length}</span> réponse${all.length>1?"s":""} reçue${all.length>1?"s":""}`;

      all.forEach((entry, i) => {
        grid.appendChild(renderCard(entry, i));
      });
    }

    // ── Actions toolbar ─────────────────────────────────────────
    document.getElementById("btn-clear").addEventListener("click", () => {
      if (confirm("Effacer toutes les réponses ?")) {
        localStorage.removeItem(STORAGE_KEY);
        render();
      }
    });

    document.getElementById("btn-export").addEventListener("click", () => {
      const all  = getResponses();
      const blob = new Blob([JSON.stringify(all, null, 2)], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = "revelate-reponses.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    // ── Init ────────────────────────────────────────────────────
    // 1. Ingère les données URL si présentes
    ingestFromURL();
    // 2. Affiche
    render();

    // 3. Écoute les nouvelles entrées (multi-onglets)
    window.addEventListener("storage", (e) => {
      if (e.key === STORAGE_KEY) render();
    });

    // ──────────────────────────────────────────────────────────
    // NOTE IMPORTANTE POUR LE DÉPLOIEMENT :
    // ──────────────────────────────────────────────────────────
    // vision.js envoie les données en mode "no-cors" (fetch POST).
    // GitHub Pages ne peut pas lire ces POST côté serveur.
    //
    // SOLUTION RECOMMANDÉE :
    // Remplace l'ENDPOINT dans vision.js par un service gratuit
    // qui redirige vers cette page avec les params en GET.
    // 
    // Option A — Formspree (gratuit) :
    //   1. Crée un form sur formspree.io
    //   2. Mets l'URL Formspree comme ENDPOINT dans vision.js
    //   3. Formspree peut rediriger vers cette page après soumission
    //
    // Option B — getform.io (gratuit) :
    //   Idem, redirige après soumission vers cette page avec ?data=...
    //
    // Option C — Supabase (que tu utilises déjà) :
    //   Appelle l'API Supabase directement depuis vision.js
    //   et lis les données ici via fetch Supabase.
    // ──────────────────────────────────────────────────────────
  </script>

</body>
</html>
